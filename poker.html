<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEGAS PRO - High Roller Poker</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-cyan: #06b6d4; 
            --accent-magenta: #ff00ff; 
            --accent-gold: #fbbf24; 
        }
        
        /* PHASE 1: The VIP Environment */
        body { 
            margin: 0; padding: 0; 
            /* Pulls your background image, falls back to a dark radial gradient */
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%), url('poker_env.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white; font-family: 'Orbitron', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; user-select: none; 
        }

        /* The Table Area */
        .room-container {
            position: relative;
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Physical Table Edge & Felt */
        .poker-table {
            position: relative;
            width: 80%;
            height: 60%;
            /* Uses your uploaded table image, falls back to a CSS dark felt */
            background: #0f172a url('table_felt.png') no-repeat center center;
            background-size: cover;
            border-radius: 200px; /* Creates the stadium oval shape */
            /* The heavy leather rail */
            border: 25px solid #020617;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.9), 
                inset 0 0 50px rgba(0,0,0,0.8), /* Shadow inside the rail */
                inset 0 0 0 5px rgba(6, 182, 212, 0.3); /* Subtle neon cyan rim light */
        }

        /* PHASE 2: The Player Seats */
        .seat {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            /* Centers the anchor point of the seat */
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Mathematical placement of seats around the oval */
        #seat-user     { top: 100%; left: 50%; }  /* Bottom Center */
        #seat-shark    { top: 75%; left: 0%; }    /* Bottom Left */
        #seat-rock     { top: 15%; left: 15%; }   /* Top Left */
        #seat-wildcard { top: 15%; left: 85%; }   /* Top Right */
        #seat-pro      { top: 75%; left: 100%; }  /* Bottom Right */

        /* Avatar Styling */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1e293b;
            border: 3px solid #334155;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }

        /* The Nameplate */
        .nameplate {
            background: rgba(2, 6, 23, 0.9);
            border: 1px solid #334155;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #94a3b8;
            backdrop-filter: blur(5px);
        }

        /* Active Player State (Who's Turn It Is) */
        .seat.active .avatar {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.6), inset 0 0 15px rgba(6, 182, 212, 0.3);
            transform: scale(1.1);
        }
        .seat.active .nameplate {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

    </style>
</head>
<body>

    <div class="room-container">
<div class="poker-table">
            
            <div class="table-center">
                <div class="main-pot">
                    <img src="casino_chips_2.png" class="chip-stack-large" alt="Pot Chips">
                    <div class="pot-amount">$25,500</div>
                </div>
                
                <div class="community-cards">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                </div>
            </div>

            <div class="seat active" id="seat-user">
                <div class="player-hand">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                </div>
                <img src="avatar_user.png" class="avatar" alt="You">
                <div class="nameplate">YOU ($50k)</div>
            </div>

            <div class="seat" id="seat-shark">
                <img src="avatar_shark.png" class="avatar" alt="Shark">
                <div class="nameplate">SHARK ($45k)</div>
            </div>

            <div class="seat" id="seat-rock">
                <img src="avatar_rock.png" class="avatar" alt="Rock">
                <div class="nameplate">ROCK ($12k)</div>
            </div>

            <div class="seat" id="seat-wildcard">
                <img src="avatar_wildcard.png" class="avatar" alt="Wildcard">
                <div class="nameplate">WILD ($80k)</div>
            </div>

            <div class="seat" id="seat-pro">
                <img src="avatar_pro.png" class="avatar" alt="Pro">
                <div class="nameplate">PRO ($150k)</div>
            </div>

        </div>
    </div>

</body>
</html>
