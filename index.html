<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEGAS PRO - High Roller Poker</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-cyan: #06b6d4; 
            --accent-magenta: #ff00ff; 
            --accent-gold: #fbbf24; 
        }
        
        /* Universal Box Sizing (Fixes the border math) */
        *, *::before, *::after { box-sizing: border-box; }
        
        /* PHASE 1: The VIP Environment */
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%), url('poker_env.png') no-repeat center center fixed; 
            background-size: cover;
            color: white; font-family: 'Orbitron', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; user-select: none; 
        }

        /* The Table Area */
        .room-container {
            position: relative;
            width: 100%;
            max-width: 1100px;
            height: 600px; /* Locked height so it doesn't squish */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Physical Table Edge & Felt */
        .poker-table {
            position: relative;
            width: 800px; /* Locked width */
            height: 400px; /* Locked height */
            background: #0f172a url('table_felt.png') no-repeat center center;
            background-size: cover;
            border-radius: 200px; /* Creates the perfect stadium oval */
            border: 25px solid #020617;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.9), 
                inset 0 0 50px rgba(0,0,0,0.8), 
                inset 0 0 0 5px rgba(6, 182, 212, 0.3); 
        }

        /* PHASE 2: The Player Seats */
        .seat {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Mathematically locked to the exact edges of the rail */
        #seat-user     { top: 100%; left: 50%; }  /* Bottom Center */
        #seat-shark    { top: 50%;  left: 0%; }   /* Middle Left edge */
        #seat-rock     { top: 0%;   left: 25%; }  /* Top Left curve */
        #seat-wildcard { top: 0%;   left: 75%; }  /* Top Right curve */
        #seat-pro      { top: 50%;  left: 100%; } /* Middle Right edge */

        /* Avatar Styling */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1e293b;
            border: 3px solid #334155;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }

        .nameplate {
            background: rgba(2, 6, 23, 0.9);
            border: 1px solid #334155;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #94a3b8;
            backdrop-filter: blur(5px);
        }

        /* Active Player State */
        .seat.active .avatar {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.6), inset 0 0 15px rgba(6, 182, 212, 0.3);
            transform: scale(1.1);
        }
        .seat.active .nameplate {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        /* PHASE 3: Cards and Chips */
        .table-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 5;
        }

        .main-pot {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 20px;
            border-radius: 30px;
            border: 1px solid #fbbf24;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .pot-amount {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
        }

        .chip-stack-large {
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }

        .community-cards {
            display: flex;
            gap: 10px;
        }

        .card {
            width: 70px;
            height: 100px;
            border-radius: 5px;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1); 
        }

        /* Player Hole Cards */
        .player-hand {
            position: absolute;
            display: flex;
            gap: 2px;
            top: -40px; 
            left: 50px;
            transform: rotate(15deg);
            z-index: -1; 
        }

        .player-hand .card {
            width: 45px;
            height: 65px;
        }
    </style>
</head>
<body>

    <div class="room-container">
        <div class="poker-table">
            
            <div class="table-center">
                <div class="main-pot">
                    <img src="casino_chips_2.png" class="chip-stack-large" alt="Pot Chips">
                    <div class="pot-amount">$25,500</div>
                </div>
                
                <div class="community-cards">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                </div>
            </div>

            <div class="seat active" id="seat-user">
                <div class="player-hand">
                    <img src="card_back.png" class="card" alt="Card">
                    <img src="card_back.png" class="card" alt="Card">
                </div>
                <img src="avatar_user.png" class="avatar" alt="You">
                <div class="nameplate">YOU ($50k)</div>
            </div>

            <div class="seat" id="seat-shark">
                <img src="avatar_shark.png" class="avatar" alt="Shark">
                <div class="nameplate">SHARK ($45k)</div>
            </div>

            <div class="seat" id="seat-rock">
                <img src="avatar_rock.png" class="avatar" alt="Rock">
                <div class="nameplate">ROCK ($12k)</div>
            </div>

            <div class="seat" id="seat-wildcard">
                <img src="avatar_wildcard.png" class="avatar" alt="Wildcard">
                <div class="nameplate">WILD ($80k)</div>
            </div>

            <div class="seat" id="seat-pro">
                <img src="avatar_pro.png" class="avatar" alt="Pro">
                <div class="nameplate">PRO ($150k)</div>
            </div>

        </div>
    </div>

</body>
</html>
