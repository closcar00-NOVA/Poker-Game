<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEGAS PRO - High Roller Poker</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-cyan: #06b6d4; 
            --accent-magenta: #ff00ff; 
            --accent-gold: #FED101; 
            --accent-green: #00985A; 
        }
        
        *, *::before, *::after { box-sizing: border-box; }
        
        body { 
            margin: 0; padding: 20px; 
            background: radial-gradient(circle at center, #1e293b 0%, #000000 100%), url('poker_env.png') no-repeat center center fixed; 
            background-size: cover;
            color: white; font-family: 'Orbitron', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden; user-select: none; 
        }

        /* MASTER LAYOUT: Left (Game) + Right (Sidebar) */
        .master-layout {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1400px;
            align-items: flex-start;
            justify-content: center;
        }

        /* LEFT COLUMN: Table + Controls */
        .main-game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px; 
            flex: 1;
            max-width: 900px;
        }

        /* The Physical Table Edge & Felt */
        .poker-table {
            position: relative;
            width: 100%;
            max-width: 900px; 
            height: 450px; 
            background: #0f172a url('table_felt.png') no-repeat center center;
            background-size: cover;
            border-radius: 225px; 
            border: 25px solid #000000;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.9), 
                inset 0 0 50px rgba(0,0,0,0.8), 
                inset 0 0 0 5px rgba(6, 182, 212, 0.3); 
        }

        /* Player Seats */
        .seat {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        #seat-user     { top: 100%; left: 50%; }  
        #seat-shark    { top: 50%;  left: 0%; }   
        #seat-rock     { top: 0%;   left: 25%; }  
        #seat-wildcard { top: 0%;   left: 75%; }  
        #seat-pro      { top: 50%;  left: 100%; } 

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1e293b;
            border: 3px solid #334155;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }

        .nameplate {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #334155;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #94a3b8;
            backdrop-filter: blur(5px);
        }

        .seat.active .avatar {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.6), inset 0 0 15px rgba(6, 182, 212, 0.3);
            transform: scale(1.1);
        }
        .seat.active .nameplate {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        /* Cards and Chips */
        .table-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 5;
        }

        .main-pot {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 20px;
            border-radius: 30px;
            border: 1px solid var(--accent-gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .pot-amount {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(254, 209, 1, 0.4);
        }

        .chip-stack-large {
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }

        .community-cards { display: flex; gap: 10px; }

        .card {
            width: 70px;
            height: 100px;
            border-radius: 5px;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .player-hand {
            position: absolute;
            display: flex;
            gap: 2px;
            top: -40px; 
            left: 50px;
            transform: rotate(15deg);
            z-index: -1; 
        }
        .player-hand .card { width: 45px; height: 65px; }

        /* THE POKER CONTROL DECK */
        #controls { 
            display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(180deg, #1e293b, #000000); 
            padding: 25px 30px; border-radius: 12px; border-top: 2px solid #475569; 
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
        }
        
        .stat-box { display: flex; flex-direction: column; align-items: center; background: #000000; padding: 12px 24px; border-radius: 8px; border: 1px solid #334155; min-width: 160px; box-shadow: inset 0 5px 10px rgba(0,0,0,0.8); }
        .stat-label { font-size: 0.8rem; color: #64748b; margin-bottom: 5px; letter-spacing: 2px; }
        .stat-value { min-width: 120px; text-align: center; font-size: 1.6rem; font-weight: 700; color: var(--accent-gold); text-shadow: 0 0 10px rgba(254, 209, 1, 0.3); }
        
        .action-group { display: flex; gap: 15px; }
        
        .poker-btn { 
            font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; 
            padding: 15px 40px; border-radius: 8px; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 2px; color: white; transition: all 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .poker-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .poker-btn:active { transform: translateY(2px); }
        
        .btn-fold { background: linear-gradient(180deg, #ef4444, #7f1d1d); border: 2px solid #fca5a5; }
        .btn-call { background: linear-gradient(180deg, #3b82f6, #1e3a8a); border: 2px solid #93c5fd; }
        .btn-raise { background: linear-gradient(180deg, var(--accent-green), #004d2d); border: 2px solid #34d399; }

        .bet-controls { display: flex; align-items: center; gap: 12px; }
        .bet-btn { background: linear-gradient(180deg, #334155, #000000); border: 1px solid #475569; color: white; width: 36px; height: 36px; border-radius: 6px; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-family: 'Orbitron', sans-serif; }
        .bet-btn:hover { background: #475569; } .bet-btn:active { transform: translateY(2px); }

        /* RIGHT COLUMN: SIDEBAR PANELS */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 320px;
            flex-shrink: 0;
        }

        .side-panel {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .panel-header {
            color: var(--accent-gold);
            font-size: 1.1rem;
            font-weight: 900;
            margin: 0 0 15px 0;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 0.9rem;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
        }

        .log-item strong { color: white; }
        .log-action.raise { color: var(--accent-green); }
        .log-action.call { color: #3b82f6; }
        .log-action.fold { color: #ef4444; }

        /* Leaderboard Specifics */
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        .leaderboard-row:last-child { border-bottom: none; }
        .lb-name { font-weight: 700; color: white; }
        .lb-score { color: var(--accent-gold); }

        @media (max-width: 1200px) {
            .master-layout { flex-direction: column; align-items: center; }
            .sidebar { width: 100%; max-width: 900px; flex-direction: row; }
            .side-panel { flex: 1; }
        }
        @media (max-width: 900px) {
            .poker-table { height: 350px; border-width: 15px; }
            #controls { flex-direction: column; gap: 20px; padding: 20px; }
            .action-group { width: 100%; justify-content: center; }
            .sidebar { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="master-layout">
        
        <div class="main-game-area">
            
            <div class="poker-table">
                <div class="table-center">
                    <div class="main-pot">
                        <img src="pot_chips.png" class="chip-stack-large" alt="Pot Chips">
                        <div class="pot-amount">$25,500</div>
                    </div>
                    
                    <div class="community-cards">
                        <img src="card_back.png" class="card" alt="Card">
                        <img src="card_back.png" class="card" alt="Card">
                        <img src="card_back.png" class="card" alt="Card">
                        <img src="card_back.png" class="card" alt="Card">
                        <img src="card_back.png" class="card" alt="Card">
                    </div>
                </div>

                <div class="seat active" id="seat-user">
                    <div class="player-hand">
                        <img src="card_back.png" class="card" alt="Card">
                        <img src="card_back.png" class="card" alt="Card">
                    </div>
                    <img src="avatar_user.png" class="avatar" alt="You">
                    <div class="nameplate">YOU ($50k)</div>
                </div>

                <div class="seat" id="seat-shark">
                    <img src="avatar_shark.png" class="avatar" alt="Shark">
                    <div class="nameplate">SHARK ($45k)</div>
                </div>

                <div class="seat" id="seat-rock">
                    <img src="avatar_rock.png" class="avatar" alt="Rock">
                    <div class="nameplate">ROCK ($12k)</div>
                </div>

                <div class="seat" id="seat-wildcard">
                    <img src="avatar_wildcard.png" class="avatar" alt="Wildcard">
                    <div class="nameplate">WILD ($80k)</div>
                </div>

                <div class="seat" id="seat-pro">
                    <img src="avatar_pro.png" class="avatar" alt="Pro">
                    <div class="nameplate">PRO ($150k)</div>
                </div>
            </div>

            <div id="controls">
                <div class="stat-box">
                    <div class="stat-label">MASTER BANKROLL</div>
                    <div class="stat-value" id="balanceDisplay">$8,500,000</div>
                </div>

                <div class="action-group">
                    <button class="poker-btn btn-fold">FOLD</button>
                    <button class="poker-btn btn-call">CALL</button>
                    <button class="poker-btn btn-raise">RAISE</button>
                </div>

                <div class="stat-box">
                    <div class="stat-label">RAISE AMOUNT</div>
                    <div class="bet-controls">
                        <button class="bet-btn" id="betMinus">-</button>
                        <div class="stat-value" id="betDisplay">$5,000</div>
                        <button class="bet-btn" id="betPlus">+</button>
                    </div>
                </div>
            </div>

        </div> <div class="sidebar">
            
            <div class="side-panel">
                <h2 class="panel-header">Table Leaders</h2>
                <div class="leaderboard-row">
                    <span class="lb-name">PRO</span>
                    <span class="lb-score">$150,000</span>
                </div>
                <div class="leaderboard-row">
                    <span class="lb-name">WILD</span>
                    <span class="lb-score">$80,000</span>
                </div>
                <div class="leaderboard-row">
                    <span class="lb-name">YOU</span>
                    <span class="lb-score">$50,000</span>
                </div>
                <div class="leaderboard-row">
                    <span class="lb-name">SHARK</span>
                    <span class="lb-score">$45,000</span>
                </div>
                <div class="leaderboard-row">
                    <span class="lb-name">ROCK</span>
                    <span class="lb-score">$12,000</span>
                </div>
            </div>

            <div class="side-panel">
                <h2 class="panel-header">Recent Plays</h2>
                <ul class="log-list">
                    <li class="log-item">
                        <span><strong>PRO</strong> raises</span>
                        <span class="log-action raise">+$5,000</span>
                    </li>
                    <li class="log-item">
                        <span><strong>WILD</strong> calls</span>
                        <span class="log-action call">$5,000</span>
                    </li>
                    <li class="log-item">
                        <span><strong>ROCK</strong> folds</span>
                        <span class="log-action fold">--</span>
                    </li>
                    <li class="log-item">
                        <span><strong>SHARK</strong> calls</span>
                        <span class="log-action call">$5,000</span>
                    </li>
                </ul>
            </div>

        </div> </div> </body>
</html>
